# Alembic 配置文件
# 【基础】alembic.ini 是 alembic 命令行的配置文件
# 【进阶】sqlalchemy.url 指向数据库，和应用的 DATABASE_URL 一致

[alembic]
# 迁移脚本存放目录
script_location = alembic

# SQLAlchemy 连接字符串（注意：如果用异步驱动 asyncpg，这里仍需 psycopg2）
# 原因：Alembic 的核心操作（DDL）是同步的，不支持 async
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/learnfast

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
