# Alembic configuration file
# alembic.ini is the CLI config file for Alembic
# sqlalchemy.url must match your application's DATABASE_URL

[alembic]
# Migration scripts directory
script_location = alembic

# SQLAlchemy connection string (sync driver required, even for async apps)
# Reason: Alembic DDL operations are synchronous and don't support asyncpg
sqlalchemy.url = postgresql+psycopg2://postgres:123456@localhost:5432/learnfast1

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
